name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Test
        run: pytest
      - name: Smoke run
        run: |
          python -m us_etf_trend_vol run-backtest --config configs/strategy_advisory.yaml --data-source synthetic --start 2018-01-01 --end 2022-12-31
