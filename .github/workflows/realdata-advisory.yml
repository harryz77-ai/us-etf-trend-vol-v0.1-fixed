name: realdata-advisory

on:
  workflow_dispatch:
    inputs:
      provider:
        description: "Market data provider"
        required: true
        default: "yahoo"
        type: choice
        options:
          - yahoo
          - stooq

      start:
        description: "Backtest start date"
        required: true
        default: "2010-01-01"

      portfolio_value:
        description: "Portfolio value in USD"
        required: true
        default: "100000"

  schedule:
    # Monthly strategy: run once per month.
    # 23:30 UTC is after the regular US market close.
    - cron: "30 23 1 * *"

permissions:
  contents: read

concurrency:
  group: realdata-advisory
  cancel-in-progress: false

jobs:
  realdata:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      PROVIDER: ${{ github.event.inputs.provider || 'yahoo' }}
      START_DATE: ${{ github.event.inputs.start || '2010-01-01' }}
      PORTFOLIO_VALUE: ${{ github.event.inputs.portfolio_value || '100000' }}
      PORTFOLIO_CSV_B64: ${{ secrets.PORTFOLIO_CSV_B64 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package with real data dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,yahoo]"

      - name: Prepare runtime portfolio
        run: |
          mkdir -p runtime

          if [ -n "$PORTFOLIO_CSV_B64" ]; then
            echo "$PORTFOLIO_CSV_B64" | base64 -d > runtime/current_portfolio.csv
            echo "Using portfolio from GitHub secret PORTFOLIO_CSV_B64"
          else
            cp examples/current_portfolio.csv runtime/current_portfolio.csv
            echo "Using examples/current_portfolio.csv because PORTFOLIO_CSV_B64 is not set"
          fi

      - name: Validate config
        run: |
          python -m us_etf_trend_vol validate-config \
            --config configs/strategy_advisory.yaml

      - name: Run real-data backtest and advisory
        shell: bash
        run: |
          set -e

          echo "Provider: $PROVIDER"
          echo "Start date: $START_DATE"
          echo "Portfolio value: $PORTFOLIO_VALUE"

          mkdir -p reports/backtests reports/advisory logs

          echo "Running backtest with $PROVIDER..."

          if ! python -m us_etf_trend_vol run-backtest \
            --config configs/strategy_advisory.yaml \
            --data-source "$PROVIDER" \
            --start "$START_DATE"; then

            echo "Primary provider $PROVIDER failed. Falling back to stooq."

            PROVIDER="stooq"

            python -m us_etf_trend_vol run-backtest \
              --config configs/strategy_advisory.yaml \
              --data-source "$PROVIDER" \
              --start "$START_DATE"
          fi

          echo "Generating advisory with $PROVIDER..."

          python -m us_etf_trend_vol suggest \
            --config configs/strategy_advisory.yaml \
            --data-source "$PROVIDER" \
            --portfolio runtime/current_portfolio.csv \
            --portfolio-value "$PORTFOLIO_VALUE"

          echo "$PROVIDER" > reports/provider_used.txt

      - name: Write advisory to GitHub job summary
        if: always()
        run: |
          echo "# Real Data Advisory Result" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "## Provider used" >> "$GITHUB_STEP_SUMMARY"
          cat reports/provider_used.txt >> "$GITHUB_STEP_SUMMARY" || true
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "## Advisory reports" >> "$GITHUB_STEP_SUMMARY"

          if [ -d reports/advisory ]; then
            find reports/advisory -maxdepth 1 -name "*.md" -print | sort | while read f; do
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo "### $f" >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
              cat "$f" >> "$GITHUB_STEP_SUMMARY"
            done
          else
            echo "No advisory report directory found." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload reports and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: realdata-advisory-results
          path: |
            reports/
            logs/
          if-no-files-found: warn